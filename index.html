<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Arol — Rogue-Lite Dungeon Crawler</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%2312141f'/%3E%3Ccircle cx='16' cy='16' r='7' fill='%2363b8ff'/%3E%3C/svg%3E" />
  <style>
    :root { --bg: #06070c; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: var(--bg);
      color: #e8ecf5;
      font-family: "Trebuchet MS", system-ui, sans-serif;
      overflow: hidden;
    }
    #app {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 10px;
      background: radial-gradient(circle at 50% 30%, #12141f 0%, #06070c 70%);
    }
    #stage {
      /* Size is driven by main.js (largest 16:9 rect × UI Scale) so the game
         fills the window like a native indie title instead of a fixed box. */
      position: relative;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(120,140,200,0.15);
      border-radius: 10px;
      overflow: hidden;
    }
    #game {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: -webkit-optimize-contrast;
      cursor: crosshair;
      background: #06070c;
    }
    #hint {
      font-size: 12px;
      color: #55627e;
      letter-spacing: 0.03em;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="stage">
      <canvas id="game" width="960" height="540"></canvas>
    </div>
    <div id="hint">Move WASD/Arrows · Aim mouse · Click attack · Space dash · Esc pause · M mute</div>
  </div>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
